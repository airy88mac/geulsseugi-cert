<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유화 노트 — 글쓰기 인증</title>

<!-- 한글 손글씨 폰트: 본문=Nanum Pen Script, 제목=Gaegu -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
    background: #15140f;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    gap: 14px;
  }
  header { font-size: 18px; font-weight: 700; color: #d8b46a; letter-spacing: -0.5px; }

  /* ── 컨트롤 패널 (내보내기 결과엔 포함 안 됨) ── */
  .panel {
    width: 100%;
    max-width: 520px;
    background: #221f17;
    border: 1px solid #3a3527;
    border-radius: 14px;
    overflow: hidden;
  }
  .panel summary {
    cursor: pointer;
    padding: 14px 16px;
    font-weight: 600;
    font-size: 14px;
    color: #d8b46a;
    list-style: none;
  }
  .panel summary::-webkit-details-marker { display: none; }
  .panel-body { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 14px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 12px; font-weight: 600; color: #9b937e;
    display: flex; justify-content: space-between;
  }
  .field label .val { color: #d8b46a; }
  textarea, input[type=text] {
    background: #15140f; color: #eee;
    border: 1px solid #3a3527; border-radius: 9px;
    padding: 10px; font-size: 14px; font-family: inherit;
    resize: vertical; line-height: 1.5;
  }
  textarea { min-height: 110px; }
  textarea:focus, input[type=text]:focus { outline: none; border-color: #d8b46a; }
  input[type=range] { width: 100%; accent-color: #d8b46a; height: 6px; }

  .export-btn {
    width: 100%; padding: 15px;
    background: #2f8b3c; color: #fff;
    border: none; border-radius: 11px;
    font-size: 16px; font-weight: 700; font-family: inherit;
    cursor: pointer; letter-spacing: -0.3px;
  }
  .export-btn:active { opacity: 0.85; }

  /* ── 결과 캔버스 ── */
  .stage {
    width: 100%; max-width: 520px;
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 10px 50px rgba(0,0,0,0.6);
    background: #000;
  }
  canvas#main { width: 100%; display: block; }

  .hint { font-size: 11px; color: #6a6452; text-align: center; line-height: 1.7; max-width: 520px; }

  /* SVG 필터는 화면에 보이지 않게 숨김 */
  .svgdefs { position: absolute; width: 0; height: 0; overflow: hidden; }
</style>
</head>
<body>

<header>🎨 유화 노트 합성기</header>

<!-- ───────── 컨트롤 패널 ───────── -->
<details class="panel" open>
  <summary>⚙️ 설정 패널</summary>
  <div class="panel-body">
    <div class="field">
      <label>본문 (손글씨로 채워짐)</label>
      <textarea id="bodyInput" placeholder="여기에 본문을 입력하세요"></textarea>
    </div>
    <div class="field">
      <label>본문 폰트 <span class="val" id="bodyFontVal">기본</span></label>
      <input type="text" id="bodyFontInput" list="fontList" placeholder="기본: DX경필바탕 → Nanum Pen Script">
    </div>
    <div class="field">
      <label>강조 제목</label>
      <input type="text" id="titleInput" value="">
    </div>
    <div class="field">
      <label>제목 색상</label>
      <input type="color" id="titleColor" value="#8a5a3c"
             style="width:64px;height:36px;padding:2px;background:#15140f;border:1px solid #3a3527;border-radius:8px;cursor:pointer;">
    </div>
    <div class="field">
      <label>제목 폰트 <span class="val" id="titleFontVal">기본</span></label>
      <input type="text" id="titleFontInput" list="fontList" placeholder="기본: 서울한강체 → Gaegu">
    </div>
    <div class="field">
      <button id="loadFontsBtn" type="button"
              style="width:100%;padding:11px;background:#2c2a22;color:#d8b46a;border:1px solid #3a3527;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;">
        🖋 내 PC 폰트 목록 불러오기 (Chrome/Edge)
      </button>
      <datalist id="fontList"></datalist>
    </div>
    <div class="field">
      <label>본문 글자 크기 <span class="val" id="fsVal">자동</span></label>
      <input type="range" id="fsSlider" min="14" max="80" value="34">
      <label style="display:flex;flex-direction:row;gap:8px;align-items:center;justify-content:flex-start;margin-top:2px;cursor:pointer;">
        <input type="checkbox" id="autoFit" checked style="width:auto;accent-color:#d8b46a;"> 책에 자동으로 맞추기
      </label>
    </div>
    <div class="field">
      <label>좌측 페이지 여백 <span class="val" id="lmVal">8%</span></label>
      <input type="range" id="lmSlider" min="3" max="18" value="8">
    </div>
    <div class="field">
      <label>우측 페이지 여백 <span class="val" id="rmVal">8%</span></label>
      <input type="range" id="rmSlider" min="3" max="18" value="8">
    </div>
    <div class="field">
      <label>유화 동화 강도 (displacement) <span class="val" id="dpVal">2</span></label>
      <input type="range" id="dpSlider" min="0" max="10" value="2">
    </div>
    <button class="export-btn" id="exportBtn">PNG로 내보내기 ↓</button>
  </div>
</details>

<div class="stage">
  <canvas id="main" width="1600" height="1200"></canvas>
</div>

<div class="hint">
  배경 유화는 <b>assets/base.png</b>를 사용합니다. 파일이 없으면 임시 파스텔 배경으로 대체됩니다.<br>
  텍스트는 유화 위에 "함께 칠해진 것처럼" 가장자리 일렁임·음영·색감 통일 후처리가 적용됩니다.
</div>

<!-- ───────── 유화 동화용 SVG 필터 ───────── -->
<!-- feTurbulence로 노이즈를 만들고, feDisplacementMap으로 글자 윤곽을 물감처럼 일렁이게 함.
     feSpecularLighting(135° 좌상단 광원)으로 약한 물감 두께감(음영)을 더함.
     scale 값은 JS에서 슬라이더로 실시간 변경. -->
<svg class="svgdefs" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="oilFilter" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap id="dispNode" in="SourceGraphic" in2="noise" scale="4"
                         xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <!-- 글자 알파를 높이맵으로 보고 약한 하이라이트 생성 -->
      <feGaussianBlur in="disp" stdDeviation="0.7" result="height"/>
      <feSpecularLighting in="height" surfaceScale="1.4" specularConstant="0.45"
                          specularExponent="16" lighting-color="#ffffff" result="spec">
        <feDistantLight azimuth="135" elevation="58"/>
      </feSpecularLighting>
      <!-- 하이라이트를 글자 모양 안으로만 제한 -->
      <feComposite in="spec" in2="disp" operator="in" result="specIn"/>
      <!-- 원본 displaced + 약한 하이라이트 합성 -->
      <feComposite in="disp" in2="specIn" operator="arithmetic"
                   k1="0" k2="1" k3="0.30" k4="0" result="lit"/>
      <feMerge><feMergeNode in="lit"/></feMerge>
    </filter>
  </defs>
</svg>

<script>
/* =========================================================================
   유화 노트 합성기
   레이어(아래→위): ① 배경 base.png  ② 본문 손글씨  ③ 강조 제목  ④ 워터마크
   ②③은 offscreen에 그린 뒤 SVG 필터로 "유화 동화" 후처리 후 합성.
   ========================================================================= */

const W = 1600, H = 1200;                 // 내보내기 해상도 (base.png 4:3 비율)

/* 본문/제목 폰트 — 사용자가 로컬 폰트를 고르면 그 패밀리를 맨 앞에 두고,
   없으면 기본값(본문=DX경필바탕→Nanum Pen Script / 제목=서울한강체→Gaegu)으로 폴백.
   selectedBodyFont/selectedTitleFont가 비면 기본 스택만 사용. */
let selectedBodyFont = '';   // 사용자가 고른 본문 폰트 패밀리명
let selectedTitleFont = '';  // 사용자가 고른 제목 폰트 패밀리명
function bodyFontStack(){
  return (selectedBodyFont ? `"${selectedBodyFont}", ` : '')
    + `'DX경필바탕', 'DXGyeongpilBatang', 'Nanum Pen Script', cursive`;
}
function titleFontStack(){
  return (selectedTitleFont ? `"${selectedTitleFont}", ` : '')
    + `'서울한강체', 'Seoul Hangang', 'SeoulHangang', 'Gaegu', cursive`;
}

/* 배경 이미지(base.png)에서 쓸 영역 (이미지 비율 0~1).
   새 이미지는 책이 이미 수평이고 프레임을 꽉 채우므로 전체 사용.
   다른 이미지를 쓰면 이 값만 조정. */
const CROP = { x: 0.0, y: 0.0, w: 1.0, h: 1.0 };
const main = document.getElementById('main');
const mctx = main.getContext('2d');

// ── DOM 핸들 ──
const bodyInput  = document.getElementById('bodyInput');
const titleInput = document.getElementById('titleInput');
const titleColorInput = document.getElementById('titleColor');
const bodyFontInput  = document.getElementById('bodyFontInput'),  bodyFontVal  = document.getElementById('bodyFontVal');
const titleFontInput = document.getElementById('titleFontInput'), titleFontVal = document.getElementById('titleFontVal');
const loadFontsBtn   = document.getElementById('loadFontsBtn');
const fontList       = document.getElementById('fontList');
const fsSlider   = document.getElementById('fsSlider'),  fsVal = document.getElementById('fsVal');
const autoFit    = document.getElementById('autoFit');
const lmSlider   = document.getElementById('lmSlider'),  lmVal = document.getElementById('lmVal');
const rmSlider   = document.getElementById('rmSlider'),  rmVal = document.getElementById('rmVal');
const dpSlider   = document.getElementById('dpSlider'),  dpVal = document.getElementById('dpVal');
const exportBtn  = document.getElementById('exportBtn');

// ── 상태 ──
let baseImg = null;        // 배경 이미지(있으면)
let baseReady = false;     // base.png 로드 성공 여부

/* -------------------------------------------------------------------------
   결정적 난수 (mulberry32) — 같은 입력이면 같은 손글씨 흔들림이 나오도록 시드 고정.
   reseed()로 매 렌더 시작 시 초기화.
   ------------------------------------------------------------------------- */
let _seed = 12345;
function reseed(s){ _seed = s >>> 0; }
function rnd(){
  _seed |= 0; _seed = (_seed + 0x6D2B79F5) | 0;
  let t = Math.imul(_seed ^ (_seed >>> 15), 1 | _seed);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
const rndRange = (a, b) => a + (b - a) * rnd();

/* -------------------------------------------------------------------------
   배경 그리기.
   base.png가 있으면 cover로 꽉 채워 그리고, 없으면 fallback 임파스토 배경.
   → 배경 색감/구도를 바꾸려면 assets/base.png 교체.
   ------------------------------------------------------------------------- */
function drawBackground(ctx, bookAngleDeg){
  if (baseReady && baseImg){
    // CROP 영역(책 부분)만 잘라 캔버스 전체에 채움 (배경 대부분 제거)
    const sx = CROP.x * baseImg.width,  sy = CROP.y * baseImg.height;
    const sw = CROP.w * baseImg.width,  sh = CROP.h * baseImg.height;
    // 책 기울기 보정: 중심 기준 회전 + 살짝 확대(빈 모서리 방지)
    ctx.save();
    if (bookAngleDeg){
      const over = 1.18;   // 회전 시 모서리 빈공간 안 생기게 확대
      ctx.translate(W/2, H/2);
      ctx.rotate(bookAngleDeg * Math.PI / 180);
      ctx.scale(over, over);
      ctx.translate(-W/2, -H/2);
    }
    ctx.drawImage(baseImg, sx, sy, sw, sh, 0, 0, W, H);
    ctx.restore();
  } else {
    drawFallbackBackground(ctx);
  }
}

/* base.png 부재 시 임시 배경: 파스텔 임파스토 필드 + 가운데 크림색 펼친 책.
   회전된 둥근 사각형 수백 개 + 그림자로 물감 덩어리를 흉내. */
function drawFallbackBackground(ctx){
  reseed(999);
  // 바탕 그라데이션
  const g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, '#d9c3d6'); g.addColorStop(0.5, '#e7d2c2'); g.addColorStop(1, '#ccd9d2');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  const pastel = [
    '#ffb3b9','#abdcc3','#ffd6b4','#bad2eb','#ffecbe',
    '#d2bee6','#c8e6d2','#ffc8af','#f0d2dc','#afdcdc'
  ];
  // 임파스토 덩어리
  for (let i = 0; i < 600; i++){
    const x = rnd() * W, y = rnd() * H;
    const w = rndRange(30, 130), h = rndRange(18, 70);
    ctx.save();
    ctx.translate(x, y); ctx.rotate(rndRange(0, Math.PI));
    ctx.shadowColor = 'rgba(0,0,0,0.18)'; ctx.shadowBlur = 6;
    ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 3;
    roundRect(ctx, -w/2, -h/2, w, h, Math.min(w,h)/2);
    ctx.fillStyle = pastel[(rnd()*pastel.length)|0];
    ctx.globalAlpha = rndRange(0.55, 0.9);
    ctx.fill();
    ctx.restore();
  }
  // 가운데 펼친 책(크림 페이지 두 장)
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 30; ctx.shadowOffsetY = 12;
  ctx.fillStyle = '#f3ead8';
  roundRect(ctx, W*0.07, H*0.15, W*0.86, H*0.70, 24); ctx.fill();
  ctx.restore();
  // 가운데 접힘선
  ctx.strokeStyle = 'rgba(150,120,110,0.35)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W*0.5, H*0.16); ctx.lineTo(W*0.5, H*0.84); ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

/* -------------------------------------------------------------------------
   펜이 놓인 사선 영역 — 이 띠 안의 글자는 그리지 않아 펜을 자연스럽게 피함.
   기준 좌표는 base.png(펼친 책+만년필) 구도에 맞춤. 펜 위치가 다르면 PEN 수정.
   ------------------------------------------------------------------------- */
const PEN = {
  x1: W*0.47, y1: H*0.34,   // 펜 끝(촉) — 책 중앙 상단
  x2: W*0.86, y2: H*0.80,   // 펜 꼭지 — 우하단
  half: W*0.045             // 띠 반폭
};
function inPenBand(px, py){
  const dx = PEN.x2 - PEN.x1, dy = PEN.y2 - PEN.y1;
  const len2 = dx*dx + dy*dy;
  let t = ((px - PEN.x1)*dx + (py - PEN.y1)*dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const cx = PEN.x1 + t*dx, cy = PEN.y1 + t*dy;
  return Math.hypot(px - cx, py - cy) < PEN.half;
}

/* 책 글씨 영역(캔버스 비율). top/bottom=세로 범위, gutter=가운데 접힘 여백 */
const BODY = { top: 0.155, bottom: 0.83, gutter: 0.035 };

/* 본문 레이아웃 1회 — 좌/우 페이지를 수평으로 흐르며 글자 배치.
   measureCtx로 글자폭을 재고, draw가 주어지면 그 위치에 그린다.
   반환: { fits } — 주어진 폰트크기로 전체 텍스트가 영역 안에 다 들어갔는지.
   가독성을 위해 글자는 수평. 손글씨 느낌은 색/베이스라인/자간 미세 랜덤으로만. */
function layoutBody(text, fontSize, leftMargin, rightMargin, measureCtx, draw){
  reseed(20240601 + text.length + fontSize);
  measureCtx.font = `${fontSize}px ${bodyFontStack()}`;

  const top = H*BODY.top, bottom = H*BODY.bottom;
  const lineH = fontSize * 1.5;
  const spaceW = fontSize * 0.32;
  const regions = [
    { left: W*(leftMargin/100),    right: W*(0.5 - BODY.gutter) },
    { left: W*(0.5 + BODY.gutter), right: W*(1 - rightMargin/100) }
  ];

  let ri = 0, x = regions[0].left, y = top + lineH;
  let overflow = false;
  function newline(){
    x = regions[ri].left; y += lineH;
    if (y > bottom){ if (ri + 1 >= regions.length){ overflow = true; return false; } ri++; x = regions[ri].left; y = top + lineH; }
    return true;
  }

  for (const ch of text){
    if (ch === '\n'){ if (!newline()) break; continue; }
    const cw = (ch === ' ') ? spaceW : measureCtx.measureText(ch).width;
    if (x + cw > regions[ri].right){ if (!newline()) break; }

    if (ch !== ' ' && draw){
      const jx = x + rndRange(-0.5, 0.5);
      const jy = y + rndRange(-1.5, 1.5);           // 베이스라인 미세 흔들림(수평 유지)
      if (!inPenBand(jx, jy)){                       // 펜 사선 영역은 건너뜀
        const gray = 95 + Math.round(rndRange(0, 15)); // #5f→#6e 사이
        draw.fillStyle = `rgb(${gray},${gray-4},${gray-8})`;
        draw.fillText(ch, jx, jy);
      }
    }
    x += cw + rndRange(-0.3, 1.0);                  // 자간 미세 랜덤
  }
  return { fits: !overflow };
}

/* 자동 글자 크기 — 본문 전체가 두 페이지 안에 "정확히 들어가는" 최대 크기 탐색.
   사용자가 크기를 조절하지 않아도 글이 책 안에 맞춰진다. */
function fitFontSize(text, leftMargin, rightMargin, measureCtx){
  let lo = 14, hi = 80, best = lo;
  for (let i = 0; i < 9; i++){           // 이분탐색 9회면 충분
    const mid = (lo + hi) / 2;
    if (layoutBody(text, mid, leftMargin, rightMargin, measureCtx, null).fits){
      best = mid; lo = mid;              // 들어가면 더 키워봄
    } else {
      hi = mid;                          // 넘치면 줄임
    }
  }
  return Math.floor(best);
}

/* 본문 손글씨 레이어 렌더 → offscreen canvas (투명 배경, W×H) */
function renderBodyLayer(text, fontSize, leftMargin, rightMargin){
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.font = `${fontSize}px ${bodyFontStack()}`;
  ctx.textBaseline = 'alphabetic';
  layoutBody(text, fontSize, leftMargin, rightMargin, ctx, ctx);
  return c;
}

/* -------------------------------------------------------------------------
   강조 제목 — 하단 중앙, Gaegu 굵게, 색상 선택값 + 밑줄 + 약한 그림자.
   반환: 제목 offscreen canvas.
   ------------------------------------------------------------------------- */
function renderTitleLayer(title){
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  if (!title.trim()) return c;          // 제목이 비면 아무것도 그리지 않음

  const color = titleColorInput.value;  // 사용자가 고른 제목 색상
  const fs = W * 0.072;                 // 제목 크기
  ctx.font = `700 ${fs}px ${titleFontStack()}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const cx = W * 0.5, cy = H * 0.935;   // 책 아래쪽으로 더 내림
  const tw = ctx.measureText(title).width;

  // 그림자 (종이 위에 얹힌 느낌)
  ctx.shadowColor = 'rgba(0,0,0,0.18)';
  ctx.shadowBlur = 2; ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 2;
  ctx.fillStyle = color;
  ctx.fillText(title, cx, cy);

  // 밑줄 (글자폭에 맞춤)
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = color;
  ctx.lineWidth = fs * 0.06;
  ctx.lineCap = 'round';
  const uy = cy + fs * 0.52;
  ctx.beginPath();
  ctx.moveTo(cx - tw/2, uy);
  ctx.lineTo(cx + tw/2, uy);
  ctx.stroke();

  return c;
}

/* -------------------------------------------------------------------------
   캔버스 천 텍스처 — 색감 통일용. base.png가 있으면 흐릿하게 깔아 색감 차용,
   없으면 노이즈 생성. overlay blend, opacity 0.15로 전체에 덮음.
   ------------------------------------------------------------------------- */
function makeClothTexture(){
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  if (baseReady && baseImg){
    const sx = CROP.x*baseImg.width, sy = CROP.y*baseImg.height;
    const sw = CROP.w*baseImg.width, sh = CROP.h*baseImg.height;
    ctx.filter = 'blur(8px)';
    ctx.drawImage(baseImg, sx, sy, sw, sh, 0, 0, W, H);
    ctx.filter = 'none';
  } else {
    const id = ctx.createImageData(W, H);
    for (let i = 0; i < id.data.length; i += 4){
      const v = 110 + ((Math.random()*60)|0);
      id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=255;
    }
    ctx.putImageData(id, 0, 0);
  }
  return c;
}

/* -------------------------------------------------------------------------
   유화 동화 — 글자 가장자리를 물감처럼 일렁이게(왜곡) 만드는 후처리.
   Safari는 canvas의 ctx.filter=url(SVG)을 지원하지 않으므로 JS로 직접 픽셀 변위.
   scale(px)만큼 노이즈 방향으로 각 픽셀을 끌어와 윤곽을 흩뜨린다.
   ------------------------------------------------------------------------- */
function applyDisplacement(src, scale){
  if (scale <= 0) return src;
  const w = src.width, h = src.height;
  const sd = src.getContext('2d').getImageData(0, 0, w, h).data;
  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const octx = out.getContext('2d');
  const od = octx.createImageData(w, h);
  const dd = od.data;
  const s = scale * 1.2;  // 변위 크기
  for (let y = 0; y < h; y++){
    for (let x = 0; x < w; x++){
      // 고주파 사인파를 겹쳐, 글자 획 '안에서도' 변위가 달라지게 → 가장자리 일렁임
      const dx = Math.round((Math.sin(y*0.20 + x*0.08) + Math.sin(y*0.45 + x*0.33)*0.6) * s);
      const dy = Math.round((Math.cos(x*0.20 + y*0.08) + Math.cos(x*0.43 + y*0.31)*0.6) * s);
      let sx = x + dx, sy = y + dy;
      if (sx < 0) sx = 0; else if (sx >= w) sx = w-1;
      if (sy < 0) sy = 0; else if (sy >= h) sy = h-1;
      const si = (sy*w + sx)*4, di = (y*w + x)*4;
      dd[di]=sd[si]; dd[di+1]=sd[si+1]; dd[di+2]=sd[si+2]; dd[di+3]=sd[si+3];
    }
  }
  octx.putImageData(od, 0, 0);
  return out;
}

/* -------------------------------------------------------------------------
   메인 렌더 파이프라인.
   ------------------------------------------------------------------------- */
function render(){
  const lm = +lmSlider.value, rm = +rmSlider.value;
  const dp = +dpSlider.value;             // 유화 동화 강도(px 변위)

  // ① 배경 (새 이미지는 수평이므로 회전 없음)
  drawBackground(mctx, 0);

  // ② 본문 — 글자 크기(자동맞춤 또는 슬라이더) → 수평 손글씨 → 동화 필터 + multiply 0.88
  let fontSize;
  if (autoFit.checked){
    fontSize = fitFontSize(bodyInput.value, lm, rm, mctx);
    fsSlider.value = fontSize;                 // 슬라이더도 자동값으로 동기화
    fsVal.textContent = '자동(' + fontSize + ')';
  } else {
    fontSize = +fsSlider.value;
    fsVal.textContent = fontSize;
  }
  const bodyLayer = applyDisplacement(renderBodyLayer(bodyInput.value, fontSize, lm, rm), dp);
  mctx.save();
  mctx.globalAlpha = 0.88;
  mctx.globalCompositeOperation = 'multiply';
  mctx.drawImage(bodyLayer, 0, 0);
  mctx.restore();

  // ③ 제목 — 동화는 약하게(가독성), 일반 합성
  const titleLayer = applyDisplacement(renderTitleLayer(titleInput.value), dp * 0.5);
  mctx.drawImage(titleLayer, 0, 0);

  // ④ 색감 통일 텍스처 overlay
  mctx.save();
  mctx.globalAlpha = 0.15;
  mctx.globalCompositeOperation = 'overlay';
  mctx.drawImage(makeClothTexture(), 0, 0);
  mctx.restore();

  // ⑤ 워터마크 (좌하단)
  mctx.save();
  mctx.globalAlpha = 0.6;
  mctx.fillStyle = '#ffffff';
  mctx.font = `${W*0.022}px -apple-system, sans-serif`;
  mctx.textAlign = 'left'; mctx.textBaseline = 'bottom';
  mctx.fillText('✦ AI로 생성한 콘텐츠', W*0.03, H - W*0.025);
  mctx.restore();
}

/* 캔버스에 쓸 폰트를 명시적으로 먼저 로드한다.
   Safari는 아직 로드 안 된 폰트로 캔버스 텍스트를 그리면 폴백하지 않고 '빈 글자'로
   그려버린다. 캔버스 사용만으로는 웹폰트 로딩이 트리거되지 않으므로 직접 load 호출. */
function ensureFontsLoaded(){
  if (!(document.fonts && document.fonts.load)) return Promise.resolve();
  const specs = ['16px "Nanum Pen Script"', '700 16px "Gaegu"'];
  if (selectedBodyFont)  specs.push(`16px "${selectedBodyFont}"`);
  if (selectedTitleFont) specs.push(`700 16px "${selectedTitleFont}"`);
  return Promise.all(specs.map(s => document.fonts.load(s).catch(()=>{})));
}
/* 폰트 로드 보장 후 렌더 */
function renderWithFonts(){ ensureFontsLoaded().then(render); }

/* 입력 변경 시 디바운스 렌더 */
let renderTimer = null;
function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderWithFonts, 80);
}

/* 슬라이더 라벨 + 렌더 바인딩 */
fsSlider.addEventListener('input', () => { autoFit.checked = false; scheduleRender(); }); // 수동 조절 시 자동맞춤 해제
autoFit.addEventListener('change', scheduleRender);
lmSlider.addEventListener('input', () => { lmVal.textContent = lmSlider.value + '%'; scheduleRender(); });
rmSlider.addEventListener('input', () => { rmVal.textContent = rmSlider.value + '%'; scheduleRender(); });
dpSlider.addEventListener('input', () => { dpVal.textContent = dpSlider.value; scheduleRender(); });
bodyInput.addEventListener('input', scheduleRender);
titleInput.addEventListener('input', scheduleRender);
titleColorInput.addEventListener('input', scheduleRender);

/* 폰트 선택 — 입력칸에 패밀리명을 적으면(또는 자동완성에서 고르면) 즉시 반영.
   선택한 폰트가 캔버스에 확실히 적용되도록 document.fonts.load 후 렌더. */
function applyFont(which, family){
  if (which === 'body'){ selectedBodyFont = family; bodyFontVal.textContent = family || '기본'; }
  else { selectedTitleFont = family; titleFontVal.textContent = family || '기본'; }
  scheduleRender();   // 폰트 로드 보장 후 렌더 (ensureFontsLoaded 경유)
}
bodyFontInput.addEventListener('input',  () => applyFont('body',  bodyFontInput.value.trim()));
titleFontInput.addEventListener('input', () => applyFont('title', titleFontInput.value.trim()));

/* 로컬 폰트 목록 불러오기 — Chrome/Edge의 Local Font Access API.
   불러온 패밀리들을 datalist에 채워 두 입력칸의 자동완성으로 제공. */
loadFontsBtn.addEventListener('click', async () => {
  if (!window.queryLocalFonts){
    alert('이 브라우저는 로컬 폰트 목록 자동 불러오기를 지원하지 않습니다.\n(Chrome/Edge에서만 가능)\n\n대신 폰트 이름을 입력칸에 직접 적으면 적용됩니다.');
    return;
  }
  try {
    loadFontsBtn.textContent = '불러오는 중...';
    const fonts = await window.queryLocalFonts();
    const families = [...new Set(fonts.map(f => f.family))].sort((a,b)=>a.localeCompare(b,'ko'));
    fontList.innerHTML = '';
    for (const fam of families){
      const opt = document.createElement('option');
      opt.value = fam;
      fontList.appendChild(opt);
    }
    loadFontsBtn.textContent = `🖋 폰트 ${families.length}개 불러옴 — 입력칸에서 선택`;
  } catch (e){
    loadFontsBtn.textContent = '🖋 내 PC 폰트 목록 불러오기 (Chrome/Edge)';
    alert('폰트 목록을 불러오지 못했습니다: ' + e.message);
  }
});

/* PNG 내보내기 — 캔버스(1600×2100)만 저장, 패널은 미포함 */
exportBtn.addEventListener('click', () => {
  render(); // 최신 상태 보장
  main.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '유화노트.png'; a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
});

/* -------------------------------------------------------------------------
   초기화: base.png 로드 시도 → 폰트 로드 → 렌더(여러 시점에서 안전 재호출).
   ------------------------------------------------------------------------- */
function init(){
  baseImg = new Image();
  baseImg.onload  = () => { baseReady = true;  renderWithFonts(); };
  baseImg.onerror = () => { baseReady = false; renderWithFonts(); }; // 없으면 fallback
  baseImg.src = 'assets/base.png';

  renderWithFonts();              // 폰트 로드 보장 후 첫 렌더
  setTimeout(renderWithFonts, 1500); // 폰트가 늦게 와도 강제 재렌더
}
init();
</script>
</body>
