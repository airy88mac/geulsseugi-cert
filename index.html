<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>글쓰기 인증</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      padding: 28px 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    header {
      font-size: 19px;
      font-weight: 700;
      color: #ff6b35;
      letter-spacing: -0.5px;
    }

    /* ── 업로드 영역 ── */
    .upload-area {
      width: 100%;
      max-width: 500px;
      border: 2px dashed #2e2e2e;
      border-radius: 20px;
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-area:active {
      border-color: #ff6b35;
      background: rgba(255,107,53,0.06);
    }
    .upload-area { position: relative; }
    .upload-area input {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 5;
    }
    .upload-icon { font-size: 52px; margin-bottom: 14px; }
    .upload-text { color: #555; font-size: 15px; line-height: 1.7; }

    /* ── 캔버스 ── */
    .canvas-wrap {
      width: 100%;
      max-width: 500px;
      position: relative;
      display: none;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }
    canvas { width: 100%; display: block; }

    /* 주황 경계선 */
    .drag-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: #ff6b35;
      cursor: ns-resize;
      touch-action: none;
      z-index: 10;
    }
    .drag-line::after {
      content: '제목 끝 — 드래그';
      position: absolute;
      right: 10px;
      top: -26px;
      font-size: 11px;
      font-weight: 600;
      color: #ff6b35;
      background: rgba(0,0,0,0.75);
      padding: 3px 8px;
      border-radius: 6px;
      pointer-events: none;
      white-space: nowrap;
    }
    .drag-pill {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 48px; height: 18px;
      background: #ff6b35;
      border-radius: 9px;
    }

    /* 상단 자르기 선 (파란색) */
    .crop-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: #35a7ff;
      cursor: ns-resize;
      touch-action: none;
      z-index: 11;
    }
    .crop-line::after {
      content: '✂️ 상단 자르기 — 드래그';
      position: absolute;
      left: 10px;
      top: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #35a7ff;
      background: rgba(0,0,0,0.75);
      padding: 3px 8px;
      border-radius: 6px;
      pointer-events: none;
      white-space: nowrap;
    }
    .crop-pill {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 48px; height: 18px;
      background: #35a7ff;
      border-radius: 9px;
    }
    .crop-overlay {
      position: absolute;
      left: 0; right: 0; top: 0;
      background: rgba(0,0,0,0.55);
      pointer-events: none;
      z-index: 9;
    }

    /* ── 컨트롤 ── */
    .controls {
      width: 100%;
      max-width: 500px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .mode-toggle {
      display: flex;
      background: #1c1c1e;
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }
    .mode-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: #555;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
    }
    .mode-btn.active { background: #ff6b35; color: #fff; }

    .card {
      background: #1c1c1e;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card-label {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-value { color: #ff6b35; }

    input[type=range] {
      width: 100%;
      height: 6px;
      accent-color: #ff6b35;
      cursor: pointer;
    }

    .color-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .color-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      outline: none;
      transition: border-color 0.18s, transform 0.1s;
    }
    .color-btn.active { border-color: #ff6b35; transform: scale(1.12); }

    .action-row { display: flex; gap: 10px; }
    .change-btn {
      padding: 15px 18px;
      background: #1c1c1e;
      color: #888;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .save-btn {
      flex: 1;
      padding: 16px;
      background: #ff6b35;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.3px;
      transition: opacity 0.15s;
    }
    .save-btn.secondary {
      background: #2c2c2e;
      flex: 0 0 auto;
      padding: 16px 20px;
    }
    .save-btn:active { opacity: 0.8; }
    .save-btn:disabled { opacity: 0.5; cursor: default; }

    .comment-input {
      width: 100%;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      min-height: 64px;
      line-height: 1.5;
    }
    .comment-input:focus { outline: none; border-color: #ff6b35; }

    .text-color-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      outline: none;
      transition: border-color 0.18s, transform 0.1s;
    }
    .text-color-btn.active { border-color: #ff6b35; transform: scale(1.12); }

    .tip {
      font-size: 12px;
      color: #3a3a3a;
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<header>✍️ 글쓰기 인증</header>

<label class="upload-area" id="uploadArea">
  <input type="file" id="fileInput" accept="image/*">
  <div class="upload-icon">🖼️</div>
  <div class="upload-text">탭해서 사진 선택<br><span style="color:#333;font-size:13px">카메라롤에서 바로 가져오기</span></div>
</label>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="canvas"></canvas>
  <div class="crop-line" id="cropLine">
    <div class="crop-pill"></div>
  </div>
  <div class="drag-line" id="dragLine">
    <div class="drag-pill"></div>
  </div>
</div>

<div class="controls" id="controls">
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="blur">🌫️ 흐리게</button>
    <button class="mode-btn" data-mode="box">⬛ 박스</button>
    <button class="mode-btn" data-mode="grain">🎞️ 필름</button>
  </div>

  <div class="card" id="blurCard">
    <div class="card-label">블러 강도 <span class="card-value" id="blurVal">25</span></div>
    <input type="range" id="blurSlider" min="5" max="60" value="25">
  </div>

  <div class="card" id="grainCard" style="display:none">
    <div class="card-label">질감 강도 <span class="card-value" id="grainVal">30</span></div>
    <input type="range" id="grainSlider" min="1" max="60" value="30">
  </div>

  <div class="card" id="colorCard" style="display:none">
    <div class="card-label">박스 색상</div>
    <div class="color-row">
      <button class="color-btn active" data-color="white"   style="background:#fff;"></button>
      <button class="color-btn"        data-color="#000"    style="background:#000;"></button>
      <button class="color-btn"        data-color="#808080" style="background:#808080;"></button>
      <button class="color-btn"        data-color="#1c1c1e" style="background:#1c1c1e; border:1px solid #333;"></button>
      <button class="color-btn"        data-color="#f2e8d9" style="background:#f2e8d9;"></button>
    </div>
    <div class="card-label" style="margin-top:6px">박스 가로 <span class="card-value" id="boxWidthVal">100%</span></div>
    <input type="range" id="boxWidthSlider" min="10" max="100" value="100">
  </div>

  <div class="card">
    <div class="card-label">코멘트</div>
    <textarea class="comment-input" id="commentInput" placeholder="이 글에 대한 코멘트를 입력하세요"></textarea>
    <div class="card-label" style="margin-top:6px">글자 크기 <span class="card-value" id="fontVal">48</span></div>
    <input type="range" id="fontSlider" min="16" max="120" value="48">
    <div class="card-label" style="margin-top:6px">글자 색상</div>
    <div class="color-row">
      <button class="text-color-btn active" data-tcolor="auto" style="background:conic-gradient(#ff6b35,#fff,#000,#35a7ff,#ff6b35); position:relative;" title="자동"></button>
      <button class="text-color-btn"        data-tcolor="#fff"    style="background:#fff;"></button>
      <button class="text-color-btn"        data-tcolor="#000"    style="background:#000;"></button>
      <button class="text-color-btn"        data-tcolor="#ff6b35" style="background:#ff6b35;"></button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">상단 자르기 <span class="card-value" id="cropVal">0%</span></div>
    <input type="range" id="cropSlider" min="0" max="40" value="0">
  </div>

  <div class="card">
    <div class="card-label">제목 영역 위치 <span class="card-value" id="titleVal">─</span></div>
    <input type="range" id="titleSlider" min="1" max="60" value="12">
  </div>

  <div class="action-row">
    <button class="change-btn" id="changeBtn">다른 사진</button>
    <button class="save-btn secondary" id="saveBtn">저장</button>
    <button class="save-btn secondary" id="copyBtn" style="display:none">복사</button>
    <button class="save-btn" id="shareBtn">공유 →</button>
  </div>

  <div class="tip">주황 선을 위아래로 드래그하거나<br>슬라이더로 제목 경계를 조정하세요</div>
</div>

<script>
  const canvas     = document.getElementById('canvas');
  const ctx        = canvas.getContext('2d');
  const fileInput  = document.getElementById('fileInput');
  const uploadArea = document.getElementById('uploadArea');
  const canvasWrap = document.getElementById('canvasWrap');
  const controlsEl = document.getElementById('controls');
  const dragLine   = document.getElementById('dragLine');
  const titleSlider = document.getElementById('titleSlider');
  const blurSlider  = document.getElementById('blurSlider');
  const blurCard   = document.getElementById('blurCard');
  const colorCard  = document.getElementById('colorCard');
  const grainCard  = document.getElementById('grainCard');
  const titleValEl = document.getElementById('titleVal');
  const blurValEl  = document.getElementById('blurVal');
  const saveBtn    = document.getElementById('saveBtn');
  const copyBtn    = document.getElementById('copyBtn');
  const shareBtn   = document.getElementById('shareBtn');
  const changeBtn  = document.getElementById('changeBtn');
  const boxWidthSlider = document.getElementById('boxWidthSlider');
  const boxWidthVal    = document.getElementById('boxWidthVal');
  const commentInput   = document.getElementById('commentInput');
  const fontSlider     = document.getElementById('fontSlider');
  const fontVal        = document.getElementById('fontVal');
  const cropSlider     = document.getElementById('cropSlider');
  const cropVal        = document.getElementById('cropVal');
  const cropLine       = document.getElementById('cropLine');
  const grainSlider    = document.getElementById('grainSlider');
  const grainVal       = document.getElementById('grainVal');

  // iOS: 공유 버튼 표시 / macOS: 복사 버튼 표시
  const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                 (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (_isIOS) {
    copyBtn.style.display  = 'none';
    shareBtn.style.display = 'block';
  } else {
    copyBtn.style.display  = 'block';
    shareBtn.style.display = 'none';
  }

  let img          = null;
  let titleRatio   = 0.12;
  let grainIntensity = 30;
  let cropTopRatio = 0;
  let mode         = 'blur';
  let blurRadius   = 25;
  let boxColor     = 'white';
  let boxWidthRatio = 1;
  let commentText  = '';
  let commentFont  = 48;
  let commentColor = 'auto';

  // ── 파일 업로드 ──────────────────────────────
  changeBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const newImg = new Image();
      newImg.onload = () => {
        img = newImg;
        canvas.width  = img.width;
        canvas.height = img.height;
        titleRatio = detectTitleRatio(img);
        titleSlider.value = Math.round(titleRatio * 100);
        updateTitleVal();
        render();
        uploadArea.style.display  = 'none';
        canvasWrap.style.display  = 'block';
        controlsEl.style.display  = 'flex';
        requestAnimationFrame(updateDragLine);
      };
      newImg.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  // ── 제목 영역 자동 감지 ───────────────────────
  function detectTitleRatio(image) {
    const tmpC   = document.createElement('canvas');
    const scale  = 0.15;
    const w = Math.max(1, Math.floor(image.width  * scale));
    const h = Math.max(1, Math.floor(image.height * scale));
    tmpC.width = w; tmpC.height = h;
    const tmpCtx = tmpC.getContext('2d');
    tmpCtx.drawImage(image, 0, 0, w, h);
    const { data } = tmpCtx.getImageData(0, 0, w, h);

    function bright(i) { return (data[i] + data[i+1] + data[i+2]) / 3; }

    // 배경 밝기: 네 모서리 평균
    const bgBright = (
      bright(0) +
      bright((w - 1) * 4) +
      bright(((h - 1) * w) * 4) +
      bright(((h - 1) * w + w - 1) * 4)
    ) / 4;
    const isDark = bgBright < 128;
    const tol    = 28;

    // 빈 줄(배경색과 가까운 행) 탐색 → 제목 끝 감지
    const minY = Math.floor(h * 0.04);
    const maxY = Math.floor(h * 0.45);
    let blankCount = 0;

    for (let y = minY; y < maxY; y++) {
      let rowSum = 0;
      for (let x = 0; x < w; x++) rowSum += bright((y * w + x) * 4);
      const rowAvg = rowSum / w;
      const isBg   = isDark ? rowAvg < bgBright + tol : rowAvg > bgBright - tol;

      if (isBg) {
        if (++blankCount >= 3) return (y - 2) / h;
      } else {
        blankCount = 0;
      }
    }
    return 0.12;
  }

  // ── 렌더링 ──────────────────────────────────
  function render() {
    if (!img) return;
    drawScene(ctx, img, img.width, img.height);
    // 잘려나갈 상단 영역을 어둡게 표시 (미리보기 전용)
    if (cropTopRatio > 0) {
      const cropY = Math.floor(img.height * cropTopRatio);
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, img.width, cropY);
      ctx.restore();
    }
  }

  function drawScene(targetCtx, image, w, h) {
    const titleH = Math.floor(h * titleRatio);
    targetCtx.filter = 'none';
    targetCtx.clearRect(0, 0, w, h);
    targetCtx.drawImage(image, 0, 0, w, h);

    if (mode === 'blur') {
      const blurred = blurredCanvas(image, w, h, blurRadius);
      targetCtx.drawImage(blurred, 0, titleH, w, h - titleH, 0, titleH, w, h - titleH);
    } else if (mode === 'box') {
      const boxW = Math.round(w * boxWidthRatio);
      const boxX = Math.round((w - boxW) / 2);
      targetCtx.fillStyle = boxColor;
      targetCtx.fillRect(boxX, titleH, boxW, h - titleH);
    } else if (mode === 'grain') {
      const bodyH = h - titleH;
      const t = grainIntensity / 60;

      // ① 가벼운 블러로 텍스트 엣지 먼저 녹임
      const blurred = blurredCanvas(image, w, h, 6 + t * 10);
      targetCtx.drawImage(blurred, 0, titleH, w, bodyH, 0, titleH, w, bodyH);

      // ② 파스텔 유화 붓터치 패치 덮기
      const colors = [
        [255,179,185], // 핑크
        [171,220,195], // 민트
        [255,214,180], // 피치
        [186,210,235], // 하늘
        [255,236,190], // 크림
        [210,190,230], // 라벤더
        [200,230,210], // 연두
        [255,200,175], // 살구
      ];

      // 이미지 크기 기반 고정 시드 → 렌더링마다 패턴 동일
      let xs = (w * 1000 + h) | 1;
      function sr() {
        xs ^= xs << 13; xs ^= xs >> 17; xs ^= xs << 5;
        return (xs >>> 0) / 0xffffffff;
      }

      const numStrokes = Math.floor(120 + t * 200);
      for (let i = 0; i < numStrokes; i++) {
        const cx   = sr() * w;
        const cy   = titleH + sr() * bodyH;
        const rx   = (15 + sr() * 55) * (0.6 + t * 0.6);
        const ry   = (10 + sr() * 35) * (0.6 + t * 0.6);
        const ang  = sr() * Math.PI;
        const alpha = 0.25 + sr() * 0.35;
        const [r, g, b] = colors[Math.floor(sr() * colors.length)];

        targetCtx.save();
        targetCtx.translate(cx, cy);
        targetCtx.rotate(ang);
        targetCtx.beginPath();
        targetCtx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
        targetCtx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        targetCtx.fill();
        targetCtx.restore();
      }
    }

    drawComment(targetCtx, image, w, h, titleH);
  }


  // 배경 밝기 → 색상 헬퍼
  function relLuminance(r, g, b) { return (0.299 * r + 0.587 * g + 0.114 * b) / 255; }

  function hexLuminance(hex) {
    if (hex === 'white') hex = '#ffffff';
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
    return relLuminance(
      parseInt(hex.slice(0, 2), 16),
      parseInt(hex.slice(2, 4), 16),
      parseInt(hex.slice(4, 6), 16)
    );
  }

  // 텍스트가 놓이는 영역의 평균 밝기 (0~1)
  function bgLuminance(image, w, h, titleH) {
    if (mode === 'box') return hexLuminance(boxColor);
    const c = document.createElement('canvas');
    c.width = 1; c.height = 1;
    const cx = c.getContext('2d');
    const sy = titleH, sh = Math.max(1, h - titleH);
    cx.drawImage(image, 0, sy, w, sh, 0, 0, 1, 1);
    const d = cx.getImageData(0, 0, 1, 1).data;
    return relLuminance(d[0], d[1], d[2]);
  }

  // iOS Safari는 canvas filter:blur 를 지원하지 않으므로 축소→확대로 직접 블러 처리
  function blurredCanvas(image, w, h, radius) {
    const factor = Math.max(2, radius);
    let curW = w, curH = h;
    let tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    tmp.getContext('2d').drawImage(image, 0, 0, w, h);

    const targetW = Math.max(1, Math.round(w / factor));
    while (curW * 0.5 > targetW) {
      const nw = Math.max(1, Math.round(curW * 0.5));
      const nh = Math.max(1, Math.round(curH * 0.5));
      const d = document.createElement('canvas');
      d.width = nw; d.height = nh;
      const dx = d.getContext('2d');
      dx.imageSmoothingEnabled = true;
      dx.drawImage(tmp, 0, 0, curW, curH, 0, 0, nw, nh);
      tmp = d; curW = nw; curH = nh;
    }

    const sw = targetW;
    const sh = Math.max(1, Math.round(h / factor));
    const small = document.createElement('canvas');
    small.width = sw; small.height = sh;
    const sCtx = small.getContext('2d');
    sCtx.imageSmoothingEnabled = true;
    sCtx.drawImage(tmp, 0, 0, curW, curH, 0, 0, sw, sh);

    const out = document.createElement('canvas');
    out.width = w; out.height = h;
    const oCtx = out.getContext('2d');
    oCtx.imageSmoothingEnabled = true;
    oCtx.drawImage(small, 0, 0, sw, sh, 0, 0, w, h);
    return out;
  }

  // 가려진 영역 위에 코멘트 텍스트 그리기
  function drawComment(targetCtx, image, w, h, titleH) {
    const text = commentText.trim();
    if (!text) return;
    const dispW  = canvasWrap.offsetWidth || w;
    const scale  = w / dispW;            // 화면 px → 캔버스 px 변환
    const fontPx = commentFont * scale;

    // 글자색 결정 (자동: 배경 밝기에 따라 검정/흰색 중 가장 눈에 띄는 색)
    let fill = commentColor;
    if (commentColor === 'auto') {
      fill = bgLuminance(image, w, h, titleH) > 0.5 ? '#000000' : '#ffffff';
    }
    const fillIsLight = hexLuminance(fill) > 0.5;
    const stroke = fillIsLight ? 'rgba(0,0,0,0.9)' : 'rgba(255,255,255,0.95)';

    targetCtx.save();
    targetCtx.font = `700 ${fontPx}px -apple-system, 'Apple SD Gothic Neo', sans-serif`;
    targetCtx.textAlign = 'center';
    targetCtx.textBaseline = 'middle';
    targetCtx.lineJoin = 'round';
    targetCtx.lineWidth = fontPx * 0.16;
    targetCtx.strokeStyle = stroke;
    targetCtx.fillStyle = fill;

    const regionW = mode === 'box' ? w * boxWidthRatio : w;
    const maxW    = regionW * 0.86;
    const lineH   = fontPx * 1.32;
    const lines   = wrapLines(targetCtx, text, maxW);
    const cx = w / 2;   // 박스가 가운데 정렬이므로 항상 이미지 중앙
    const cy = (titleH + h) / 2;
    let y = cy - (lines.length - 1) * lineH / 2;
    for (const ln of lines) {
      targetCtx.strokeText(ln, cx, y);   // 외곽선 먼저
      targetCtx.fillText(ln, cx, y);
      y += lineH;
    }
    targetCtx.restore();
  }

  function wrapLines(targetCtx, text, maxW) {
    const out = [];
    for (const para of text.split('\n')) {
      if (para === '') { out.push(''); continue; }
      let line = '';
      for (const ch of para) {
        const test = line + ch;
        if (targetCtx.measureText(test).width > maxW && line) {
          out.push(line); line = ch;
        } else {
          line = test;
        }
      }
      if (line) out.push(line);
    }
    return out;
  }

  // ── 모드 버튼 ────────────────────────────────
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mode = btn.dataset.mode;
      blurCard.style.display  = mode === 'blur'  ? 'flex' : 'none';
      colorCard.style.display = mode === 'box'   ? 'flex' : 'none';
      grainCard.style.display = mode === 'grain' ? 'flex' : 'none';
      render();
    });
  });

  // ── 색상 버튼 ────────────────────────────────
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      boxColor = btn.dataset.color;
      render();
    });
  });

  // ── 슬라이더 ─────────────────────────────────
  blurSlider.addEventListener('input', () => {
    blurRadius = +blurSlider.value;
    blurValEl.textContent = blurRadius;
    render();
  });

  titleSlider.addEventListener('input', () => {
    titleRatio = Math.max(cropTopRatio + 0.02, +titleSlider.value / 100);
    updateTitleVal();
    updateDragLine();
    render();
  });

  boxWidthSlider.addEventListener('input', () => {
    boxWidthRatio = +boxWidthSlider.value / 100;
    boxWidthVal.textContent = boxWidthSlider.value + '%';
    render();
  });

  commentInput.addEventListener('input', () => {
    commentText = commentInput.value;
    render();
  });

  fontSlider.addEventListener('input', () => {
    commentFont = +fontSlider.value;
    fontVal.textContent = commentFont;
    render();
  });

  document.querySelectorAll('.text-color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.text-color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      commentColor = btn.dataset.tcolor;
      render();
    });
  });

  grainSlider.addEventListener('input', () => {
    grainIntensity = +grainSlider.value;
    grainVal.textContent = grainIntensity;
    render();
  });

  function updateTitleVal() {
    titleValEl.textContent = Math.round(titleRatio * 100) + '%';
  }

  cropSlider.addEventListener('input', () => {
    cropTopRatio = +cropSlider.value / 100;
    if (cropTopRatio > titleRatio - 0.02) {
      cropTopRatio = Math.max(0, titleRatio - 0.02);
      cropSlider.value = Math.round(cropTopRatio * 100);
    }
    cropVal.textContent = Math.round(cropTopRatio * 100) + '%';
    updateDragLine();
    render();
  });

  // ── 드래그 선 ────────────────────────────────
  function updateDragLine() {
    if (!img) return;
    const H = canvasWrap.offsetHeight;
    dragLine.style.top = (H * titleRatio) + 'px';
    cropLine.style.top = (H * cropTopRatio) + 'px';
  }

  let dragging = false;

  dragLine.addEventListener('pointerdown', e => {
    dragging = true;
    dragLine.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  dragLine.addEventListener('pointermove', e => {
    if (!dragging) return;
    const rect = canvasWrap.getBoundingClientRect();
    titleRatio = Math.max(cropTopRatio + 0.02, Math.min(0.60, (e.clientY - rect.top) / rect.height));
    titleSlider.value = Math.round(titleRatio * 100);
    updateTitleVal();
    updateDragLine();
    render();
  });

  dragLine.addEventListener('pointerup', () => { dragging = false; });

  // 상단 자르기 선 드래그
  let cropDragging = false;

  cropLine.addEventListener('pointerdown', e => {
    cropDragging = true;
    cropLine.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  cropLine.addEventListener('pointermove', e => {
    if (!cropDragging) return;
    const rect = canvasWrap.getBoundingClientRect();
    let r = (e.clientY - rect.top) / rect.height;
    r = Math.max(0, Math.min(titleRatio - 0.02, r));
    cropTopRatio = r;
    cropSlider.value = Math.round(r * 100);
    cropVal.textContent = Math.round(r * 100) + '%';
    updateDragLine();
    render();
  });

  cropLine.addEventListener('pointerup', () => { cropDragging = false; });
  window.addEventListener('resize', updateDragLine);

  // ── 출력 캔버스 생성 (저장/공유 공통) ──────────
  async function buildOutputBlob() {
    const full = document.createElement('canvas');
    full.width  = img.width;
    full.height = img.height;
    drawScene(full.getContext('2d'), img, img.width, img.height);

    const cropY = Math.floor(img.height * cropTopRatio);
    const out   = document.createElement('canvas');
    out.width   = img.width;
    out.height  = img.height - cropY;
    out.getContext('2d').drawImage(
      full, 0, cropY, img.width, out.height,
      0, 0, img.width, out.height
    );
    return new Promise(r => out.toBlob(r, 'image/jpeg', 0.95));
  }

  // ── 저장 (다운로드) ──────────────────────────
  saveBtn.addEventListener('click', async () => {
    if (!img) return;
    saveBtn.textContent = '처리 중...';
    saveBtn.disabled = true;
    await new Promise(r => setTimeout(r, 60));
    try {
      const blob = await buildOutputBlob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = '글쓰기인증.jpg'; a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert('저장 실패: ' + err.message);
    } finally {
      saveBtn.textContent = '저장';
      saveBtn.disabled = false;
    }
  });

  // ── 복사 (macOS 전용) ────────────────────────
  // Safari는 clipboard.write 호출이 user gesture와 동일 태스크에 있어야 함.
  // ClipboardItem에 Promise를 직접 전달하면 gesture 체인이 유지됨.
  copyBtn.addEventListener('click', async () => {
    if (!img) return;
    copyBtn.textContent = '처리 중...';
    copyBtn.disabled = true;
    try {
      await navigator.clipboard.write([
        new ClipboardItem({
          'image/png': (async () => {
            const blob = await buildOutputBlob();
            return new Promise(resolve => {
              const tmpImg = new Image();
              const url = URL.createObjectURL(blob);
              tmpImg.onload = () => {
                const c = document.createElement('canvas');
                c.width = tmpImg.naturalWidth;
                c.height = tmpImg.naturalHeight;
                c.getContext('2d').drawImage(tmpImg, 0, 0);
                URL.revokeObjectURL(url);
                c.toBlob(resolve, 'image/png');
              };
              tmpImg.src = url;
            });
          })()
        })
      ]);
      copyBtn.textContent = '복사됨!';
      setTimeout(() => { copyBtn.textContent = '복사'; }, 1500);
    } catch (err) {
      alert('복사 실패: ' + err.message);
      copyBtn.textContent = '복사';
    } finally {
      copyBtn.disabled = false;
    }
  });

  // ── 공유 (iOS 전용 Share Sheet) ─────────────
  shareBtn.addEventListener('click', async () => {
    if (!img) return;
    shareBtn.textContent = '처리 중...';
    shareBtn.disabled = true;
    await new Promise(r => setTimeout(r, 60));
    try {
      const blob = await buildOutputBlob();
      const file = new File([blob], '글쓰기인증.jpg', { type: 'image/jpeg' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: '글쓰기 인증' });
      }
    } catch (err) {
      if (err.name !== 'AbortError') alert('공유 실패: ' + err.message);
    } finally {
      shareBtn.textContent = '공유 →';
      shareBtn.disabled = false;
    }
  });
</script>
</body>
</html>
